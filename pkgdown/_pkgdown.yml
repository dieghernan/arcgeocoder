url: https://dieghernan.github.io/arcgeocoder

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-BMYBJTKBY0
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

repo:
  branch: main

development:
  mode: auto

home:
  title: arcgeocoder | Geocoding with the ArcGIS REST API service
  description: >
    Lightweight interface for geocoding addresses and reverse geocoding
    coordinates with the ArcGIS REST API service, with no API key required.
authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/

reference:
- title: Geocoding and reverse geocoding
  desc: >
    Functions for sending geocoding and reverse geocoding requests to the
    ArcGIS REST API.
- contents:
  - has_concept("geocoding")

- title: Datasets
  desc: >
    Reference data used to filter geocoding results and choose spatial
    references.
- contents:
  - has_concept("datasets")

- title: About the package
  desc: Package-level documentation and metadata.
- contents:
  - arcgeocoder-package

articles:
- title: Get started
  contents:
  - arcgeocoder

- title: Understanding reverse geocoding
  navbar: Reverse geocoding
  contents:
  - feature-types

- title: Mapping with arcgeocoder
  navbar: Mapping
  contents:
  - articles/static
  - articles/leaflet
