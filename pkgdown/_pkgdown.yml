url: https://dieghernan.github.io/arcgeocoder

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-BMYBJTKBY0
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

repo:
  branch: main

development:
  mode: auto

home:
  title: arcgeocoder | Geocoding with the ArcGIS REST API service
  description: >
    Lightweight interface for geocoding addresses and reverse geocoding
    coordinates with the ArcGIS REST API service, with no API key required.
authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/

reference:
- title: Geocoding and reverse geocoding
  desc: >
    Core functions for geocoding addresses, places and categories, and for
    reverse geocoding coordinates with the ArcGIS REST API.
- contents:
  - has_concept("geocoding")

- title: Reference data
  desc: >
    Built-in datasets used to filter geocoding requests and work with ArcGIS
    spatial references.
- contents:
  - has_concept("datasets")

- title: Package documentation
  desc: >
    Package-level documentation and metadata.
- contents:
  - arcgeocoder-package

articles:
- title: Get started
  desc: >
    Introduction to arcgeocoder.
  contents:
  - arcgeocoder

- title: Reverse geocoding
  desc: >
    Learn how reverse geocoding works in the ArcGIS REST API and how feature
    types can be used to control the returned results.
  navbar: Reverse geocoding
  contents:
  - feature-types

- title: Mapping
  desc: >
    Examples showing how to use arcgeocoder results in static and interactive
    maps.
  navbar: Mapping
  contents:
  - articles/static
  - articles/leaflet
