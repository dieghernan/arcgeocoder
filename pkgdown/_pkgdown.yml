url: https://dieghernan.github.io/arcgeocoder

template:
  bootstrap: 5
  package: gitdevr
  params:
    ganalytics: G-BMYBJTKBY0
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

repo:
  branch: main

development:
  mode: auto

home:
  title: arcgeocoder | Geocoding with the ArcGIS REST API
  description: >
    Geocode addresses, reverse geocode coordinates and find places by category
    with the ArcGIS REST API. No API key is required.
authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/

reference:
- title: Geocoding and reverse geocoding
  desc: >
    Geocode single-line and structured addresses, reverse geocode coordinates
    and find places by category.
- contents:
  - has_concept("geocoders")

- title: Reference data
  desc: >
    Browse supported place categories and coordinate reference systems.
- contents:
  - has_keyword("datasets")

- title: Package documentation
  desc: >
    View package-level documentation and useful links.
- contents:
  - arcgeocoder-package

articles:
- title: Get started
  desc: >
    Geocode addresses, reverse geocode coordinates and find places by category.
  contents:
  - arcgeocoder

- title: Reverse geocoding
  desc: >
    Understand the ArcGIS feature hierarchy and control the types of features
    returned by reverse geocoding requests.
  navbar: Reverse geocoding
  contents:
  - feature-types

- title: Mapping
  desc: >
    Display geocoding results on static and interactive maps.
  navbar: Mapping
  contents:
  - articles/static
  - articles/leaflet
